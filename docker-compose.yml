version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - adminer
  web:
    build: .
    ports:
      - "8501"
    volumes:
      - ./media:/app/media
    environment:
      - DB_HOST=db
      - POSTGRES_DB=visionera_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=visionera_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080"
    depends_on:
      - db
volumes:
  postgres_data: