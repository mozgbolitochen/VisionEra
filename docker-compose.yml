version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - adminer
      - monitoring
  web:
    build: .
#    expose:
#      - "8501"
    ports:
      - "8501"
    volumes:
      - ./media:/app/media
    environment:
      - DB_HOST=db
      - POSTGRES_DB=visionera_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=visionera_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
  adminer:
    image: adminer
    restart: always
#    expose:
#      - "8080"
    ports:
      - "8080"
    depends_on:
      - db
  monitoring:
    image: netdata/netdata:latest
    restart: always
    hostname: visionera-monitor
#    expose:
#      - "19999"
#    ports:
#      - "19999"
    ports:
      - "127.0.0.1:19999:19999"
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  postgres_data:
  netdataconfig:
  netdatalib:
  netdatacache: